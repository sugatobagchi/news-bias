<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>News Bias Detector</title>
    <style>
      * {
        box-sizing: border-box;
      }
      body {
        width: 360px;
        margin: 0;
        padding: 14px 16px 16px;
        font:
          14px/1.45 system-ui,
          -apple-system,
          Segoe UI,
          Roboto,
          sans-serif;
        color: #18181b;
        background: #fafafa;
      }
      h1 {
        margin: 0 0 10px;
        font-size: 15px;
        font-weight: 600;
      }
      button {
        width: 100%;
        padding: 10px 12px;
        border: none;
        border-radius: 10px;
        font-size: 14px;
        font-weight: 600;
        color: #fff;
        background: #18181b;
        cursor: pointer;
      }
      button:disabled {
        opacity: 0.55;
        cursor: not-allowed;
      }
      #status {
        margin: 10px 0 0;
        min-height: 1.2em;
        font-size: 12px;
        color: #52525b;
      }
      #results {
        margin-top: 12px;
        padding: 10px 12px;
        border-radius: 10px;
        background: #fff;
        border: 1px solid #e4e4e7;
        font-size: 13px;
        line-height: 1.5;
        white-space: pre-wrap;
        word-break: break-word;
        max-height: 280px;
        overflow-y: auto;
      }
      #results.empty {
        display: none;
      }
      .row {
        margin-bottom: 8px;
      }
      .label {
        font-size: 11px;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 0.04em;
        color: #71717a;
        margin-bottom: 2px;
      }
      .err {
        color: #b91c1c;
      }
    </style>
  </head>
  <body>
    <h1>News Bias Detector</h1>
    <button type="button" id="scan">Scan Article</button>
    <p id="status" aria-live="polite"></p>
    <div id="results" class="empty"></div>
    <script src="popup.js"></script>
  </body>
</html>
