<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>News Bias Detector</title>
    <style>
      * {
        box-sizing: border-box;
      }
      body {
        width: 380px;
        margin: 0;
        padding: 14px 16px 16px;
        font:
          14px/1.45 system-ui,
          -apple-system,
          Segoe UI,
          Roboto,
          sans-serif;
        color: #18181b;
        background: #fafafa;
      }
      h1 {
        margin: 0 0 4px;
        font-size: 16px;
        font-weight: 600;
      }
      .subtitle {
        margin: 0 0 14px;
        font-size: 12px;
        line-height: 1.4;
        color: #71717a;
      }
      .panel[hidden] {
        display: none !important;
      }
      .stack {
        display: flex;
        flex-direction: column;
        gap: 8px;
      }
      button {
        width: 100%;
        padding: 10px 12px;
        border: none;
        border-radius: 10px;
        font-size: 14px;
        font-weight: 600;
        cursor: pointer;
      }
      button.primary {
        color: #fff;
        background: #18181b;
      }
      button.secondary {
        color: #18181b;
        background: #fff;
        border: 1px solid #d4d4d8;
      }
      button:disabled {
        opacity: 0.55;
        cursor: not-allowed;
      }
      #status {
        margin: 8px 0 0;
        min-height: 1.2em;
        font-size: 12px;
        color: #52525b;
      }
      #status.err {
        color: #b91c1c;
      }
      .card {
        margin-top: 10px;
        padding: 12px;
        border-radius: 10px;
        background: #fff;
        border: 1px solid #e4e4e7;
        font-size: 13px;
        line-height: 1.45;
      }
      .verdict-title {
        font-weight: 600;
        margin-bottom: 6px;
      }
      .verdict-title.ok {
        color: #166534;
      }
      .verdict-title.warn {
        color: #a16207;
      }
      .verdict-title.bad {
        color: #b91c1c;
      }
      ul.signals {
        margin: 8px 0 0;
        padding-left: 18px;
        color: #52525b;
        font-size: 12px;
      }
      ul.signals li {
        margin-bottom: 4px;
      }
      .meta {
        font-size: 12px;
        color: #71717a;
        margin-top: 8px;
      }
      .actions-row {
        display: flex;
        gap: 8px;
        margin-top: 10px;
      }
      .actions-row button {
        flex: 1;
      }
      .mono {
        font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
        font-size: 11px;
        word-break: break-all;
      }
    </style>
  </head>
  <body>
    <h1>News Bias Detector</h1>

    <!-- Home -->
    <div id="panel-home" class="panel">
      <p class="subtitle">
        Analyze the page in your active tab, or open the full analyzer to paste
        text.
      </p>
      <div class="stack">
        <button type="button" class="primary" id="btn-predict">
          Predict on this page
        </button>
        <button type="button" class="secondary" id="btn-open-analyzer">
          Open analyzer
        </button>
      </div>
    </div>

    <!-- Loading -->
    <div id="panel-loading" class="panel" hidden>
      <p class="subtitle" id="loading-message">Scanning this page…</p>
      <p id="status" aria-live="polite"></p>
    </div>

    <!-- Assessment + confirm -->
    <div id="panel-assess" class="panel" hidden>
      <div id="assess-card" class="card"></div>
      <p id="assess-status" class="subtitle" aria-live="polite"></p>
      <div class="actions-row">
        <button type="button" class="secondary" id="btn-assess-back">
          Back
        </button>
        <button type="button" class="primary" id="btn-submit-analysis" disabled>
          Copy for analysis
        </button>
      </div>
    </div>

    <p id="global-status" class="subtitle" aria-live="polite" style="margin-top: 12px; margin-bottom: 0"></p>
    <script src="popup.js"></script>
  </body>
</html>
